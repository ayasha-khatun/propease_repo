name: CI/CD Pipeline - PropEase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: CI – Build & Lint
  # ─────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run ESLint
      - name: Run Lint
        run: npm run lint

      # Step 5: Build the project (Vite)
      - name: Build Project
        env:
          VITE_apiKey: ${{ secrets.VITE_API_KEY }}
          VITE_authDomain: ${{ secrets.VITE_AUTH_DOMAIN }}
          VITE_projectId: ${{ secrets.VITE_PROJECT_ID }}
          VITE_storageBucket: ${{ secrets.VITE_STORAGE_BUCKET }}
          VITE_messagingSenderId: ${{ secrets.VITE_MESSAGING_SENDER_ID }}
          VITE_appId: ${{ secrets.VITE_APP_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # Step 6: Upload build artifact (dist folder)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────
  # JOB 2: CD – Deploy to Firebase Hosting
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build # build job সফল হলে তবেই deploy হবে
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Download build artifact from previous job
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Step 3: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: propease-baa74
        continue-on-error: true

      # Step 4: Confirm deployment success
      - name: Deployment Complete
        run: echo "✅ Firebase deployment finished. Site live at https://propease-baa74.web.app"
